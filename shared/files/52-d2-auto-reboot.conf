// D2 Edge fleet — unattended-upgrades auto-reboot policy.
// Installed by shared/scripts/{bootstrap,update}.sh into
// /etc/apt/apt.conf.d/52-d2-auto-reboot. Drop-in (higher number) wins
// over commented-out defaults in /etc/apt/apt.conf.d/50unattended-upgrades.
//
// Rationale: auto-installed kernel security patches need a reboot before
// the running kernel actually picks them up. Without auto-reboot, Wazuh
// keeps flagging the CVE against the still-running old kernel until
// someone manually reboots. Decision documented in
// project_auto_patch_reboot.md (2026-04-14, fleet-wide).
//
// Reboots fire only when /var/run/reboot-required exists at the
// scheduled time, so quiet nights produce no reboot.
Unattended-Upgrade::Automatic-Reboot "true";
Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
Unattended-Upgrade::Automatic-Reboot-Time "02:00";
