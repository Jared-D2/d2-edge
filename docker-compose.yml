services:

  # ─── Tailscale sidecar ────────────────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:v1.96.5@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
    container_name: tailscale
    hostname: ${EDGE_HOSTNAME}
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${EDGE_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    command: >
      sh -c "tailscaled &
      until tailscale status --json >/dev/null 2>&1; do sleep 2; done;
      tailscale up
      --authkey=$$TS_AUTHKEY
      --hostname=$$TS_HOSTNAME
      --advertise-tags=tag:edge-pi --accept-routes && wait"
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Syslog proxy ─────────────────────────────────────────────────────────
  # NOTE: syslog-ng must run as root (PUID/PGID=0) because it binds to
  # privileged port 514 on the host network with --no-caps. The LinuxServer
  # s6 init uses PUID/PGID for the abc user; non-root causes EACCES on 514.
  syslog-proxy:
    image: lscr.io/linuxserver/syslog-ng:4.10.2@sha256:cced30157941adec14b320747b0bdbc7114551ef67a699186fb35e3b0d3fbf8b
    container_name: syslog-proxy
    profiles: ["${DEPLOY_SYSLOG_PROXY:-enabled}"]
    hostname: syslog-proxy
    restart: unless-stopped
    network_mode: host
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - PUID=0
      - PGID=0
      - LOG_TO_STDOUT=true
    volumes:
      - ./syslog-proxy/config:/config
      - ./syslog-proxy/logs:/var/log/syslog-proxy
      - ./syslog-proxy/state:/var/lib/syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl stats --control=/config/syslog-ng.ctl >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Zabbix proxy ─────────────────────────────────────────────────────────
  zabbix-proxy:
    image: zabbix/zabbix-proxy-sqlite3:alpine-7.4-latest@sha256:3916f37cde80a125c5ec92c4d4c4225dd58cb1fbaad7bb8154b6b010b3a245a8
    container_name: zabbix-proxy
    profiles: ["${DEPLOY_ZABBIX_PROXY:-enabled}"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      tailscale:
        condition: service_healthy
    volumes:
      - ./zabbix-proxy/config/zabbix_proxy.conf:/etc/zabbix/zabbix_proxy.conf:ro
      - ./zabbix-proxy/data:/var/lib/zabbix
      - ./zabbix-proxy/logs:/var/log/zabbix
    healthcheck:
      test: ["CMD-SHELL", "zabbix_proxy -R diaginfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── FreeRADIUS proxy ─────────────────────────────────────────────────────
  freeradius-proxy:
    image: freeradius/freeradius-dev:arm64v8-v3.2.x-alpine@sha256:5769ddb3dcc1620f7140e90f73a04e02cbb66b8e8149984c7c96ed5e49d4bb18
    container_name: freeradius-proxy
    profiles: ["${DEPLOY_FREERADIUS_PROXY:-enabled}"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      tailscale:
        condition: service_healthy
    volumes:
      - ./freeradius-proxy/config/rendered/clients.conf:/opt/etc/raddb/clients.conf:ro
      - ./freeradius-proxy/config/rendered/proxy.conf:/opt/etc/raddb/proxy.conf:ro
      - ./freeradius-proxy/config/rendered/default:/opt/etc/raddb/sites-enabled/default:ro
      - ./freeradius-proxy/certs:/opt/etc/raddb/certs/radsec:ro
    command: ["radiusd", "-f", "-l", "stdout"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x radiusd >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Auvik collector ──────────────────────────────────────────────────────
  # NOTE: auviknetworks/collector does not publish version tags.
  # Pinned by digest. To update, pull latest and update the digest.
  auvik:
    image: auviknetworks/collector@sha256:38cd68547ee09c6990eb0023cbdecfc290875196d489fa7f6a58f6e8959ee43d
    container_name: auvik
    profiles: ["${DEPLOY_AUVIK:-enabled}"]
    hostname: auvik-${EDGE_SITE_ID}
    restart: unless-stopped
    network_mode: host
    environment:
      - AUVIK_USERNAME=${AUVIK_USERNAME}
      - AUVIK_API_KEY=${AUVIK_API_KEY}
      - AUVIK_DOMAIN_PREFIX=${AUVIK_DOMAIN_PREFIX}
    volumes:
      - ./auvik/config:/config
      - ./auvik/etc:/etc/auvik
      - ./auvik/logs:/usr/share/agent/logs
    # Auvik's image doesn't expose a dedicated health endpoint; checking the
    # collector process is still running is what `restart: unless-stopped`
    # can actually react to. Long start_period because initial handshake
    # with Auvik SaaS can take a minute on slow links.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f /usr/share/agent >/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ─── D2 Network Test Agent ────────────────────────────────────────────────
  d2-agent:
    build: ./d2-agent
    container_name: d2-agent
    profiles: ["${DEPLOY_D2_AGENT:-enabled}"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - AGENT_TOKEN=${AGENT_TOKEN}
      - TENANT_NAME=${TENANT_NAME}
      - CONTROLLER_URL=${CONTROLLER_URL}
      - AGENT_ID=${EDGE_HOSTNAME}
      - NETBOX_SITE_SLUG=${NETBOX_SITE_SLUG}
      - TENANT_ID=${TENANT_ID}
      - HEARTBEAT_INTERVAL=30
      - GIT_SHA=${GIT_SHA:-unknown}
    volumes:
      - ./d2-agent/d2-internal-root.crt:/usr/local/share/ca-certificates/d2-internal-root.crt:ro
      - ./d2-agent/buffer:/app/buffer
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Zabbix agent 2 ───────────────────────────────────────────────────────
  zabbix-agent2:
    image: zabbix/zabbix-agent2:alpine-7.4-latest@sha256:60a07c67c9bf8ca6eeabbed0ab211a8587e2ea55807cdeb92481b2909a9449a0
    container_name: zabbix-agent2
    profiles: ["${DEPLOY_ZABBIX_AGENT2:-enabled}"]
    restart: unless-stopped
    network_mode: host
    depends_on:
      tailscale:
        condition: service_healthy
    # Docker group access for container metrics (zabbix user not in group
    # inside the image; need host docker group mapped in).
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ZBX_HOSTNAME=${EDGE_HOSTNAME}
      - ZBX_METADATA=linux d2-edge raspberry-pi
      - ZBX_SERVER_HOST=127.0.0.1
      - ZBX_SERVER_PORT=10051
    healthcheck:
      test: ["CMD-SHELL", "zabbix_agent2 -t agent.ping >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Certificate server ───────────────────────────────────────────────────
  # Serves the internal CA root cert for device onboarding.
  # Devices pull: http://<PI_LAN_IP>/d2tech-root-ca.crt
  cert-server:
    image: nginx:alpine@sha256:0c5d96dc61c5c3646c1284495a1b32914f0f7f55fa4b7dcf5600b60e8c969a7b
    container_name: cert-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./cert-server/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cert-server/public:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/d2tech-root-ca.crt >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
