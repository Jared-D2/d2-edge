services:

  # ─── Tailscale sidecar ────────────────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${EDGE_HOSTNAME}
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${EDGE_HOSTNAME}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    command: >
      sh -c "tailscaled & sleep 15 && tailscale up
      --authkey=$$TS_AUTHKEY
      --hostname=$$TS_HOSTNAME
      --accept-routes && wait"

  # ─── Syslog proxy ─────────────────────────────────────────────────────────
  syslog-proxy:
    image: lscr.io/linuxserver/syslog-ng:latest
    container_name: syslog-proxy
    hostname: syslog-proxy
    restart: unless-stopped
    network_mode: host
    depends_on:
      - tailscale
    environment:
      - TZ=${TZ}
      - PUID=0
      - PGID=0
      - LOG_TO_STDOUT=true
    volumes:
      - ./syslog-proxy/config:/config
      - ./syslog-proxy/logs:/var/log/syslog-proxy
      - ./syslog-proxy/state:/var/lib/syslog-ng

  # ─── Zabbix proxy ─────────────────────────────────────────────────────────
  zabbix-proxy:
    image: zabbix/zabbix-proxy-sqlite3:alpine-7.4-latest
    container_name: zabbix-proxy
    restart: unless-stopped
    network_mode: host
    depends_on:
      - tailscale
    volumes:
      - ./zabbix-proxy/config/zabbix_proxy.conf:/etc/zabbix/zabbix_proxy.conf:ro
      - ./zabbix-proxy/data:/var/lib/zabbix
      - ./zabbix-proxy/logs:/var/log/zabbix

  # ─── FreeRADIUS proxy ─────────────────────────────────────────────────────
  freeradius-proxy:
    image: freeradius/freeradius-dev:arm64v8-v3.2.x-alpine
    container_name: freeradius-proxy
    restart: unless-stopped
    network_mode: host
    depends_on:
      - tailscale
    volumes:
      - ./freeradius-proxy/config/rendered/clients.conf:/opt/etc/raddb/clients.conf:ro
      - ./freeradius-proxy/config/rendered/proxy.conf:/opt/etc/raddb/proxy.conf:ro
      - ./freeradius-proxy/config/rendered/policy-operator-name:/opt/etc/raddb/policy-operator-name:ro
      - ./freeradius-proxy/config/rendered/default:/opt/etc/raddb/sites-enabled/default:ro
    command: ["radiusd", "-f", "-l", "stdout"]

  # ─── Auvik collector ──────────────────────────────────────────────────────
  auvik:
    image: auviknetworks/collector:latest
    container_name: auvik
    hostname: auvik-${EDGE_SITE_ID}
    restart: unless-stopped
    network_mode: host
    environment:
      - AUVIK_USERNAME=${AUVIK_USERNAME}
      - AUVIK_API_KEY=${AUVIK_API_KEY}
      - AUVIK_DOMAIN_PREFIX=${AUVIK_DOMAIN_PREFIX}
    volumes:
      - ./auvik/config:/config
      - ./auvik/etc:/etc/auvik
      - ./auvik/logs:/usr/share/agent/logs

  # ─── D2 Network Test Agent ────────────────────────────────────────────────
  d2-agent:
    build: ./d2-agent
    container_name: d2-agent
    restart: unless-stopped
    network_mode: host
    depends_on:
      - tailscale
    environment:
      - AGENT_TOKEN=${AGENT_TOKEN}
      - TENANT_NAME=${TENANT_NAME}
      - CONTROLLER_URL=${CONTROLLER_URL}
      - AGENT_ID=${EDGE_HOSTNAME}
      - TENANT_ID=${TENANT_ID}
      - HEARTBEAT_INTERVAL=30
    volumes:
      - ./d2-agent/app.py:/app/app.py
