# Minimal static file server for device onboarding.
# Serves the D2 internal CA root cert over plaintext HTTP on port 80.
# Plaintext is acceptable: the contents are a public root CA cert, and
# devices fetch it once during provisioning before they trust any TLS.
# Bound to LAN only via UFW rule (192.168.0.0/16 on port 80).

server {
    listen 80 default_server;
    server_name _;
    root /certs;

    # Security + noise suppression
    server_tokens off;
    autoindex off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Cache-Control "public, max-age=3600" always;

    # Only GET/HEAD allowed
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Return 404 (not 403) for unknown paths, and hide errors behind a
    # blank body so we do not leak filesystem structure.
    location / {
        try_files $uri =404;
    }

    # Do not serve dotfiles (.htaccess, etc.)
    location ~ /\. {
        deny all;
    }
}
